name: CI
on: [push, pull_request]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: pytest -v tests/

      - name: Test simulation
        run: |
          echo "The spiral remembers what the line forgets." > test_input.txt
          python python/codex_sim.py --input-file test_input.txt --steps 7 --out test_trace.json
          cat test_trace.json

